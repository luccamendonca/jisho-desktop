name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS arm64 (Apple Silicon)
          - os: macos-latest
            platform: mac
            arch: arm64

          # macOS x64 (Intel)
          - os: macos-13
            platform: mac
            arch: x64

          # Windows builds (x64 + arm64)
          - os: windows-latest
            platform: win
            arch: ""

          # Linux builds (x64 + arm64)
          - os: ubuntu-latest
            platform: linux
            arch: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & Publish (${{ matrix.platform }} ${{ matrix.arch }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --${{ matrix.platform }} ${{ matrix.arch && format('--arch {0}', matrix.arch) }} --publish always
